<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - FilmyZone</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="movie-details-page">

    <img src="images/latest/movie1.jpg" alt="Movie Poster">

    <h1>Movie Name</h1>

    <p><strong>Genre:</strong> Action</p>

    <p><strong>Language:</strong> Hindi</p>

    <p><strong>Release:</strong> 2026</p>

    <button class="download-btn">
        <i class="fa-solid fa-download"></i>
        Download Movie
    </button>
<div class="movie-info">

    <h2>Movie Information</h2>

    <div class="info-row">
        <span>🎭 Genre</span>
        <span>Action, Drama</span>
    </div>

    <div class="info-row">
        <span>🌍 Language</span>
        <span>Hindi</span>
    </div>

    <div class="info-row">
        <span>📅 Release</span>
        <span>2026</span>
    </div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
